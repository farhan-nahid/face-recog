services:
  app:
    container_name: "ak-aws-face-rec-service"
    image: "evidentbd/ak-aws-face-rec-service:latest"
    env_file:
      - .env
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
      labels:
        - "com.evident.service=ak-aws-face-rec-service"
        - "com.evident.version=2.0"
    volumes:
      - ./src:/app:ro # Read-only mount for security
    ports:
      - "8000:8000"
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - face-recog-network

networks:
  face-recog-network:
    driver: bridge
