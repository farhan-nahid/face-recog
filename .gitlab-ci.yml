stages:
  - test
  - build

variables:
  # Docker Variables
  DOCKER_REGISTRY: docker.io
  DOCKER_USERNAME: evidentbd
  DOCKER_IMAGE_NAME: evidentbd/ak-aws-face-rec-service
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  DOCKER_DRIVER: overlay2
  # Sonar Variables
  SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
  GIT_DEPTH: "0"

### SONARQUBE JOB ###
sonarqube-check:
  stage: test
  image: 
    name: sonarsource/sonar-scanner-cli:11
    entrypoint: [""]
  tags:
    - docker-build
  cache:
    key: "sonar-cache-$CI_COMMIT_REF_SLUG"
    paths:
      - "${SONAR_USER_HOME}/cache"
  script: 
    - sonar-scanner -Dsonar.host.url="${SONAR_HOST_URL}"
  allow_failure: true
  rules:
    # Run on Merge Requests targeting sandbox, master, main, or develop
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event' && ($CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "sandbox" || $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "master" || $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main" || $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop")
    # Also run on direct pushes to these branches if needed
    - if: $CI_COMMIT_BRANCH =~ /^(master|main|develop|sandbox)$/

### DOCKER BUILD JOB ###
build-and-push:
  stage: build
  image: docker:latest
  services:
    - name: docker:dind
      alias: docker
      variables:
        DOCKER_TLS_CERTDIR: ""
      entrypoint: ["dockerd-entrypoint.sh"]
      command: ["--host=tcp://0.0.0.0:2375", "--host=unix:///var/run/docker.sock", "--tls=false"]
  variables:
    FF_NETWORK_PER_BUILD: "true"
  tags:
    - docker-build
  before_script:
    - echo "${DOCKER_PASSWORD}" | docker login -u "${DOCKER_USERNAME}" --password-stdin
  script:
    - |
      echo "Waiting for Docker daemon..."
      for i in $(seq 1 30); do
        if docker info >/dev/null 2>&1; then break; fi
        sleep 1
      done
    - docker build -t $DOCKER_IMAGE_NAME:$CI_COMMIT_TAG .
    - docker push $DOCKER_IMAGE_NAME:$CI_COMMIT_TAG
  rules:
    # Only run when a tag is created
    - if: $CI_COMMIT_TAG